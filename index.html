<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cat Gallery — Feline Wonders</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-inner">
            <span class="header-tag">✦ Est. 2025 ✦</span>
            <h1>The Cat Gallery</h1>
            <p class="header-subtitle">A curated collection of feline elegance &amp; charm</p>
        </div>
    </header>

    <main>

        <figure>
            <img src="https://img.freepik.com/free-photo/cute-cat-spending-time-indoors_23-2150649172.jpg"
                 alt="A cute cat relaxing indoors on a cozy surface, looking content and fluffy">
            <figcaption>
                <h2>The Indoor Dreamer</h2>
                <p>Some cats are born for the indoors — plush cushions, warm windowsills, and the art of doing absolutely nothing. This little one has mastered the ancient craft of pure relaxation, proving that comfort is a lifestyle, not just a mood.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL2dldHR5aW1hZ2VzLTE0OTA1NzY1NDQuanBnIiwiZWRpdHMiOnsicmVzaXplIjp7IndpZHRoIjo4Mjh9fX0="
                 alt="A fluffy cat with bright curious eyes looking directly at the camera">
            <figcaption>
                <h2>Eyes of Wonder</h2>
                <p>Those wide, luminous eyes hold galaxies of curiosity. Cats see the world with an intensity we can only dream of — every shadow, every flicker, every quiet rustle becomes a grand adventure worth investigating.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://www.rover.com/blog/wp-content/uploads/2019/04/cute-big-eyes-960x540-1.jpg"
                 alt="An adorable cat with large expressive eyes sitting and staring sweetly">
            <figcaption>
                <h2>The Sweet Stare</h2>
                <p>Big eyes, big feelings. This kitty communicates volumes without a single word — just a gaze that melts your heart and demands snacks simultaneously. A true master of silent persuasion.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://hips.hearstapps.com/hmg-prod/images/blue-eyed-seal-point-himalayan-cat-resting-at-royalty-free-image-1724786346.jpg?crop=0.669xw:1.00xh;0.216xw,0"
                 alt="A blue-eyed seal point Himalayan cat resting gracefully with fluffy fur">
            <figcaption>
                <h2>Himalayan Royalty</h2>
                <p>The Himalayan cat is the very definition of regal. With sapphire eyes and fur as soft as clouds, this breed carries itself with an aristocratic grace that makes every ordinary moment feel like a royal portrait sitting.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://5.imimg.com/data5/SELLER/Default/2024/7/432521238/KJ/NN/VL/11138964/4802.jpg"
                 alt="A beautiful cat with striking coat pattern posed elegantly">
            <figcaption>
                <h2>Pattern & Poise</h2>
                <p>Every stripe and spot tells a story millions of years in the making. The natural coat patterns of cats are nature's finest artwork — bold, symmetrical, and endlessly fascinating. This beauty wears its heritage proudly.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://www.alleycat.org/wp-content/uploads/2019/03/FELV-cat.jpg"
                 alt="A street cat with a gentle expression, resilient and full of character">
            <figcaption>
                <h2>The Resilient Soul</h2>
                <p>Not every cat lives in a palace — some are shaped by the streets, the wind, and the kindness of strangers. These resilient souls carry a quiet dignity that reminds us: character is forged in hardship, and every cat deserves love.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://cdn.britannica.com/34/235834-050-C5843610/two-different-breeds-of-cats-side-by-side-outdoors-in-the-garden.jpg"
                 alt="Two different breeds of cats sitting side by side outdoors in a garden">
            <figcaption>
                <h2>Garden Companions</h2>
                <p>Two cats, two breeds, one shared moment in a sun-dappled garden. Despite their differences in coat and color, they sit in quiet companionship — a reminder that friendship transcends appearances and flourishes in the simplest moments.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://d2zp5xs5cp8zlg.cloudfront.net/image-90082-800.jpg"
                 alt="A majestic cat with a long flowing coat and proud posture">
            <figcaption>
                <h2>Silken Majesty</h2>
                <p>Flowing fur, a proud posture, and an air of absolute confidence — this cat knows exactly what it is: magnificent. Long-haired breeds carry a timeless beauty that has inspired artists, poets, and devoted cat lovers for centuries.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="http://images.squarespace-cdn.com/content/v1/607f89e638219e13eee71b1e/1684821560422-SD5V37BAG28BURTLIXUQ/michael-sum-LEpfefQf4rU-unsplash.jpg"
                 alt="A cat photographed in beautiful natural light with a serene and thoughtful expression">
            <figcaption>
                <h2>Light & Serenity</h2>
                <p>Caught in a moment of golden light, this cat embodies the quiet magic of being fully present. Cats have an extraordinary gift — they inhabit the now completely, teaching us that stillness is not emptiness, but a kind of grace.</p>
            </figcaption>
        </figure>

    </main>

    <footer>
        <p>✦ The Cat Gallery — Celebrating feline beauty in all its forms ✦</p>
        <p>Made with love for every cat, everywhere.</p>
    </footer>

</body>
</html>
